# yaml-language-server: $schema=https://raw.githubusercontent.com/microsoft/AgentSchema/refs/heads/main/schemas/v1.0/ContainerAgent.yaml
kind: hosted
name: custom-maf-agent
protocols:
  - protocol: responses
    version: "1.0.0"
resources:
  cpu: "0.5"
  memory: "1Gi"
environment_variables:
  # LLM 出口: APIM_AOAI_ENDPOINT があれば APIM AI Gateway 経由（Chat Completions）、
  # 無ければ FOUNDRY_PROJECT_ENDPOINT（ランタイム注入）にフォールバック。
  - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
    value: gpt-5.4                       # 既存デプロイを参照（再作成しない）
  # LLM を APIM 経由にする（extLab2-2 の azure-openai operation = Chat Completions）。
  # validate-azure-ad-token(audience=cognitiveservices) を APIM 側で維持することで
  # Agent 365 Block が LLM 出口にも効く。不要ならこの 2 行をコメントアウトすれば Foundry 直結に戻る。
  - name: APIM_AOAI_ENDPOINT
    value: https://apim-aigateway-eastus2.azure-api.net/openai
  - name: APIM_AOAI_API_VERSION
    value: "2024-10-21"
  # MCP（APIM 経由＝本ラボの条件）
  - name: CONTOSO_MCP_URL
    value: https://apim-aigateway-eastus2.azure-api.net/contoso-policy/mcp
  - name: MCP_SCOPE
    value: https://cognitiveservices.azure.com/.default
code_configuration:
  runtime: python_3_13
  entry_point: main.py
  dependency_resolution: remote_build
