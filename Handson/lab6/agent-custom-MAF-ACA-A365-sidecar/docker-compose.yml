# Entra Agent ID サイドカー出口ラボ（B = agent-custom-MAF-ACA-A365 のサイドカー版）
#
# sidecar : Microsoft Entra SDK for AgentID コンテナ。Blueprint 資格情報を握り、
#           fmi_path 2 段階交換を肩代わりして Agent Identity 名義のトークンを払い出す。
# agent   : B と同一の Contoso サポート MAF エージェント（FastAPI /chat）。
#           出口トークン（LLM / MCP = APIM 経由）をサイドカーから取得する。
#
# 起動:  docker compose up --build
#   - agent : http://localhost:8000 （/chat, /healthz, /debug/auth）
#   - sidecar HTTP API は外部公開しない（agent からは内部ネットワーク http://sidecar:5000）。
#     ホストからのデバッグ用に 127.0.0.1:5001 にのみ公開している。

services:
  sidecar:
    image: mcr.microsoft.com/entra-sdk/auth-sidecar:1.0.0-azurelinux3.0-distroless
    ports:
      - "127.0.0.1:5001:5000"
    environment:
      # --- Blueprint（親 SP）の識別子 ---
      AzureAd__Instance: "https://login.microsoftonline.com/"
      AzureAd__TenantId: "${TENANT_ID}"
      AzureAd__ClientId: "${BLUEPRINT_APP_ID}"
      # --- 資格情報（dev 専用: client secret）---
      # 本番は SignedAssertionFilePath(AKS WI) / SignedAssertionFromManagedIdentity(VM) に変更
      AzureAd__ClientCredentials__0__SourceType: "ClientSecret"
      AzureAd__ClientCredentials__0__ClientSecret: "${BLUEPRINT_CLIENT_SECRET}"
      # --- ダウンストリーム API: APIM AI Gateway（アプリトークン / Agent Identity）---
      #   LLM・MCP とも audience は cognitiveservices なので 1 つを共有する（= 'Apim'）。
      #   RequestAppToken=true で autonomous（Agent Identity）トークンを発行する。
      DownstreamApis__Apim__BaseUrl: "${APIM_BASE_URL:-https://apim-aigateway-eastus2.azure-api.net/}"
      DownstreamApis__Apim__Scopes__0: "${APIM_SCOPE:-https://cognitiveservices.azure.com/.default}"
      DownstreamApis__Apim__RequestAppToken: "true"
      # --- 参考: Microsoft Graph（任意・接続検証用に残す）---
      DownstreamApis__Graph__BaseUrl: "https://graph.microsoft.com/v1.0/"
      DownstreamApis__Graph__Scopes__0: "https://graph.microsoft.com/.default"
      DownstreamApis__Graph__RequestAppToken: "true"
      ASPNETCORE_URLS: "http://+:5000"
    healthcheck:
      test: ["CMD", "/app/healthcheck", "||", "exit", "1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  agent:
    build: .
    ports:
      - "8000:8000"
    environment:
      # --- 出口（サイドカー / Agent ID）---
      USE_SIDECAR_EGRESS: "true"
      SIDECAR_URL: "http://sidecar:5000"
      SIDECAR_DOWNSTREAM: "Apim"
      AGENT_CLIENT_ID: "${AGENT_CLIENT_ID}"
      AZURE_TENANT_ID: "${TENANT_ID}"
      # --- LLM（APIM 経由）---
      APIM_AOAI_ENDPOINT: "${APIM_AOAI_ENDPOINT:-https://apim-aigateway-eastus2.azure-api.net/openai}"
      APIM_AOAI_DEPLOYMENT: "${APIM_AOAI_DEPLOYMENT:-gpt-5.4}"
      APIM_AOAI_API_VERSION: "${APIM_AOAI_API_VERSION:-2024-10-21}"
      APIM_SCOPE: "${APIM_SCOPE:-}"
      # --- MCP（APIM 経由 / Bearer）---
      CONTOSO_MCP_URL: "${CONTOSO_MCP_URL:-https://apim-aigateway-eastus2.azure-api.net/contoso-policy/mcp}"
      # --- 可観測性（任意）---
      APPLICATIONINSIGHTS_CONNECTION_STRING: "${APPLICATIONINSIGHTS_CONNECTION_STRING:-}"
    depends_on:
      sidecar:
        condition: service_started
